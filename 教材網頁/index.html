<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI輔助專題與科展</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-brand">
                <div class="logo-wrapper">
                    <img src="生物科圖案.jpg" alt="生物科圖案" class="logo-img">
                </div>
                <div class="title-wrapper">
                    <h1>AI輔助專題與科展</h1>
                    <p class="author-info">製作者：臺北麗山高中林獻升老師</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn-icon" title="切換主題" aria-label="切換主題">
                    <i class="bi bi-sun-fill"></i>
                </button>
            </div>
        </header>

        <!-- Search and Filter Bar -->
        <section class="toolbar-section">
            <div class="search-box-wrapper">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="search-input" placeholder="搜尋檔案名稱、分類、標籤或副檔名..." autocomplete="off">
                <button id="clear-search" class="btn-clear" style="display: none;">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="filter-actions">
                <div class="select-wrapper">
                    <i class="bi bi-funnel select-icon"></i>
                    <select id="type-filter">
                        <option value="all">所有檔案類型</option>
                        <option value="presentation">簡報 (.pptx, .ppt)</option>
                        <option value="pdf">PDF 文件 (.pdf)</option>
                        <option value="document">文件 (.docx, .doc)</option>
                        <option value="spreadsheet">試算表 (.xlsx)</option>
                        <option value="web">網頁 (.html)</option>
                        <option value="audio">語音/音訊 (.mp3, .m4a)</option>
                        <option value="video">影片 (.mp4)</option>
                        <option value="image">圖表/圖片 (.png, .jpg)</option>
                        <option value="text">文字與資料 (.md, .txt, .json)</option>
                        <option value="archive">壓縮檔 (.zip, .7z)</option>
                        <option value="other">其他類型</option>
                    </select>
                </div>
                <button id="reset-filters" class="btn-secondary" title="重設所有篩選">
                    <i class="bi bi-arrow-counterclockwise"></i> 重設
                </button>
            </div>
        </section>

        <!-- Main Layout -->
        <main class="main-layout">
            <!-- Sidebar: Top Categories -->
            <aside class="sidebar-aside">
                <nav class="category-nav">
                    <button class="nav-item active" data-category="all">
                        <i class="bi bi-grid-fill"></i>
                        <span>全部資源</span>
                        <span class="badge" id="count-all">0</span>
                    </button>
                    <!-- JavaScript will insert other categories here dynamically -->
                    <div id="dynamic-categories-nav"></div>
                </nav>
            </aside>

            <!-- Main Content Panel -->
            <div class="content-panel">
                <!-- Category Info Header -->
                <div id="category-info-panel" class="category-info-card">
                    <h2 id="cat-title">全部資源</h2>
                    <h3 id="cat-english">All Resources</h3>
                    <p id="cat-description">本資料庫依據 Google Drive 原始資料夾重建，完整收錄檔案原始路徑與雲端連結。您可以使用上方搜尋框檢索檔名、路徑、分類及副檔名。</p>
                </div>

                <!-- Featured Interactive Resource Section -->
                <div id="featured-links-section" class="featured-section">
                    <h3 class="featured-section-title"><i class="bi bi-stars"></i> 精選線上專題教學平台與互動網頁</h3>
                    <div class="featured-grid" id="featured-links-grid">
                        <!-- JavaScript will populate this -->
                    </div>
                </div>

                <!-- Sub-category Filter Pills -->
                <div id="sub-cat-wrapper" class="sub-cat-pills-container" style="display: none;">
                    <div class="sub-cat-pills-label"><i class="bi bi-folder2-open"></i> 子分類篩選：</div>
                    <div id="sub-cat-pills" class="pills-list">
                        <!-- JavaScript will populate this -->
                    </div>
                </div>

                <!-- Active Filter Indicators -->
                <div id="active-filters-info" class="active-filters-bar" style="display: none;">
                    <span>正在篩選：<strong id="filter-desc"></strong></span>
                    <button id="clear-active-filter" class="btn-text">清除篩選</button>
                </div>

                <!-- Files Display List -->
                <div id="files-list-container" class="files-list-wrapper">
                    <!-- JavaScript will generate file categories and cards -->
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p>正在載入資料庫資源...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Floating Audio/Video Player -->
    <div id="floating-player" class="player-panel" style="display: none;">
        <div class="player-content">
            <div class="player-info">
                <i class="bi bi-music-note-beamed player-icon" id="player-media-icon"></i>
                <div class="player-text">
                    <div class="player-title" id="player-title">未播放媒體</div>
                    <div class="player-category" id="player-sub">分類路徑</div>
                </div>
            </div>
            <div class="player-controls-wrapper">
                <audio id="media-element" controls></audio>
                <!-- Video will use this same wrapper if it's a video, but we also support a modal for video -->
                <video id="video-element" style="display:none;" controls></video>
            </div>
            <button id="close-player" class="btn-icon-sm" title="關閉播放器">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>

    <!-- PDF & Web Preview Modal -->
    <div id="preview-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title-group">
                    <span class="file-type-badge" id="modal-type-badge">PDF</span>
                    <h3 id="modal-title">檔案預覽</h3>
                </div>
                <div class="modal-actions">
                    <a id="modal-open-new" href="#" target="_blank" class="btn-primary-sm" title="在新分頁開啟完整檔案">
                        <i class="bi bi-box-arrow-up-right"></i> 在新分頁開啟
                    </a>
                    <button id="close-modal" class="btn-icon" title="關閉預覽">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- iframe will be dynamically added here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast-container" class="toast-wrapper"></div>

    <!-- Data and App Scripts -->
    <script src="data.js"></script>
    <script src="index.js"></script>
</body>
</html>
