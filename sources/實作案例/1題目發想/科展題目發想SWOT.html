<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科學研究題目 SWOT 分析工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f5f0e8;
  --bg2:       #ede8de;
  --surface:   #faf8f4;
  --card:      #ffffff;
  --border:    #ddd8cc;
  --border2:   #c8c0b0;

  --ink:       #1e1c18;
  --ink2:      #4a4640;
  --ink3:      #8a847a;
  --ink4:      #b8b2a8;

  --s-bg:      #edf7f2;
  --s-border:  #a8d9be;
  --s-text:    #1a6b45;
  --s-dot:     #2ea06a;

  --w-bg:      #fff4ec;
  --w-border:  #f0c4a0;
  --w-text:    #8a3d10;
  --w-dot:     #e07030;

  --o-bg:      #eff4ff;
  --o-border:  #b0c8f0;
  --o-text:    #1e3d8a;
  --o-dot:     #3060d0;

  --t-bg:      #fff0f2;
  --t-border:  #f0b0b8;
  --t-text:    #8a1a28;
  --t-dot:     #d03048;

  --gold:      #c8860a;
  --gold-bg:   #fff8ec;
  --gold-bd:   #e8c878;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.05);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  position: relative;
}

/* ── Subtle paper grain overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: .5;
}

/* ── Warm gradient blobs ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 10% 0%, rgba(200,134,10,.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 400px at 90% 100%, rgba(46,160,106,.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
header {
  position: relative;
  z-index: 20;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0;
}

.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 1.5rem 2rem;
  display: flex;
  align-items: flex-end;
  gap: 2rem;
  flex-wrap: wrap;
}

.header-left { flex: 1; min-width: 280px; }

.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  background: var(--gold-bg);
  border: 1px solid var(--gold-bd);
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .22rem .7rem;
  border-radius: 3px;
  margin-bottom: .7rem;
}

.eyebrow::before { content: '◆'; font-size: .5rem; }

header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(1.5rem, 2.8vw, 2.2rem);
  font-weight: 900;
  line-height: 1.25;
  color: var(--ink);
  letter-spacing: -.01em;
}

header h1 em {
  font-style: normal;
  color: var(--gold);
  border-bottom: 2px solid var(--gold-bd);
}

.header-sub {
  margin-top: .45rem;
  font-size: .8rem;
  color: var(--ink3);
  font-weight: 300;
  line-height: 1.6;
}

.legend-strip {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: center;
  padding: .6rem 1rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.leg {
  display: flex;
  align-items: center;
  gap: .45rem;
  font-size: .72rem;
  font-family: 'DM Mono', monospace;
  color: var(--ink2);
}

.leg-sq {
  width: 12px; height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── App layout ── */
.app {
  position: relative;
  z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
  padding: 1.75rem 2rem 5rem;
  display: grid;
  grid-template-columns: 290px 1fr;
  gap: 1.75rem;
  align-items: start;
}

/* ── Sidebar ── */
.sidebar {
  position: sticky;
  top: 1.5rem;
}

.sidebar-label {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink4);
  padding: 0 .25rem .6rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: .75rem;
}

.topic-list { display: flex; flex-direction: column; gap: .35rem; }

.topic-btn {
  display: flex;
  align-items: flex-start;
  gap: .7rem;
  padding: .7rem .9rem;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: all .18s ease;
  width: 100%;
  position: relative;
}

.topic-btn:hover {
  background: var(--surface);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}

.topic-btn.active {
  background: var(--card);
  border-color: var(--gold-bd);
  box-shadow: var(--shadow-md);
}

.topic-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--gold);
  border-radius: 0 2px 2px 0;
}

.t-num {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  font-weight: 500;
  color: var(--ink4);
  min-width: 1.4rem;
  padding-top: .1rem;
  flex-shrink: 0;
}

.topic-btn.active .t-num { color: var(--gold); }

.t-label {
  font-size: .8rem;
  color: var(--ink2);
  line-height: 1.4;
  font-weight: 400;
}

.topic-btn.active .t-label { color: var(--ink); font-weight: 500; }

.t-score {
  margin-left: auto;
  flex-shrink: 0;
  font-size: .62rem;
  padding: .15rem .4rem;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
}

/* ── Main ── */
.main-panel { display: flex; flex-direction: column; gap: 1.25rem; }

/* animation */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { animation: slideUp .3s ease both; }
.anim-d1 { animation-delay: .04s; }
.anim-d2 { animation-delay: .08s; }
.anim-d3 { animation-delay: .12s; }
.anim-d4 { animation-delay: .16s; }

/* ── Topic hero card ── */
.hero-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.8rem 2rem;
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}

.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--gold) 0%, #e8b040 50%, var(--s-dot) 100%);
}

.hero-top {
  display: flex;
  align-items: flex-start;
  gap: 1.2rem;
  margin-bottom: 1.1rem;
}

.hero-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 3.5rem;
  font-weight: 900;
  color: var(--border2);
  line-height: 1;
  flex-shrink: 0;
  user-select: none;
  letter-spacing: -.04em;
}

.hero-right { flex: 1; }

.hero-tags {
  display: flex;
  gap: .4rem;
  flex-wrap: wrap;
  margin-bottom: .6rem;
}

.htag {
  font-size: .65rem;
  padding: .2rem .6rem;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  border: 1px solid;
}

.htag-food    { background: #fff8ec; border-color: #e8c878; color: #8a5e10; }
.htag-chem    { background: #eff4ff; border-color: #b0c8f0; color: #1e3d8a; }
.htag-bio     { background: #edf7f2; border-color: #a8d9be; color: #1a6b45; }
.htag-physics { background: #f5f0ff; border-color: #c8b0f0; color: #4a1a8a; }
.htag-env     { background: #fff4ec; border-color: #f0c4a0; color: #8a3d10; }

.hero-right h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(1rem, 1.6vw, 1.25rem);
  font-weight: 700;
  line-height: 1.5;
  color: var(--ink);
}

.hero-right h2 mark {
  background: linear-gradient(120deg, var(--gold-bg) 0%, #fef0c0 100%);
  color: var(--gold);
  padding: 0 .2rem;
  border-radius: 3px;
  font-style: normal;
}

.hero-desc {
  font-size: .84rem;
  color: var(--ink2);
  line-height: 1.8;
  padding-top: .8rem;
  border-top: 1px dashed var(--border);
}

/* ── SWOT grid ── */
.swot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.swot-card {
  border-radius: 10px;
  border: 1px solid;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s;
}

.swot-card:hover { box-shadow: var(--shadow-md); }

.swot-card.s-card { background: var(--s-bg); border-color: var(--s-border); }
.swot-card.w-card { background: var(--w-bg); border-color: var(--w-border); }
.swot-card.o-card { background: var(--o-bg); border-color: var(--o-border); }
.swot-card.t-card { background: var(--t-bg); border-color: var(--t-border); }

.swot-head {
  display: flex;
  align-items: center;
  gap: .8rem;
  padding: .9rem 1.2rem;
  border-bottom: 1px solid;
}

.s-card .swot-head { border-color: var(--s-border); background: rgba(46,160,106,.06); }
.w-card .swot-head { border-color: var(--w-border); background: rgba(224,112,48,.06); }
.o-card .swot-head { border-color: var(--o-border); background: rgba(48,96,208,.06); }
.t-card .swot-head { border-color: var(--t-border); background: rgba(208,48,72,.06); }

.swot-letter {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.8rem;
  font-weight: 900;
  line-height: 1;
}

.s-card .swot-letter { color: var(--s-text); }
.w-card .swot-letter { color: var(--w-text); }
.o-card .swot-letter { color: var(--o-text); }
.t-card .swot-letter { color: var(--t-text); }

.swot-head-info {}
.swot-en {
  font-family: 'DM Mono', monospace;
  font-size: .58rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink4);
}

.swot-zh {
  font-size: .85rem;
  font-weight: 700;
  color: var(--ink);
}

.swot-hint {
  margin-left: auto;
  font-size: .65rem;
  color: var(--ink4);
  font-style: italic;
  font-family: 'Noto Serif TC', serif;
  text-align: right;
  max-width: 110px;
  line-height: 1.4;
}

.swot-body { padding: .8rem 1.1rem 1rem; }

.swot-item {
  display: flex;
  gap: .65rem;
  align-items: flex-start;
  padding: .4rem .55rem;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
  border: 1px solid transparent;
  margin-bottom: .25rem;
  font-size: .81rem;
  color: var(--ink2);
  line-height: 1.55;
}

.swot-item:hover { background: rgba(0,0,0,.04); }

.swot-item.hi {
  border-color: inherit;
  font-weight: 500;
}

.s-card .swot-item.hi { background: rgba(46,160,106,.1); border-color: var(--s-border); color: var(--s-text); }
.w-card .swot-item.hi { background: rgba(224,112,48,.1); border-color: var(--w-border); color: var(--w-text); }
.o-card .swot-item.hi { background: rgba(48,96,208,.1); border-color: var(--o-border); color: var(--o-text); }
.t-card .swot-item.hi { background: rgba(208,48,72,.1); border-color: var(--t-border); color: var(--t-text); }

.si-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: .42rem;
  transition: transform .15s;
}

.swot-item:hover .si-dot { transform: scale(1.3); }
.swot-item.hi .si-dot    { transform: scale(1.4); }

.s-card .si-dot { background: var(--s-dot); }
.w-card .si-dot { background: var(--w-dot); }
.o-card .si-dot { background: var(--o-dot); }
.t-card .si-dot { background: var(--t-dot); }

.si-star {
  margin-left: auto;
  flex-shrink: 0;
  font-size: .7rem;
  opacity: 0;
  transition: opacity .15s;
}

.swot-item:hover .si-star { opacity: .4; }
.swot-item.hi .si-star    { opacity: 1; }

/* ── Discussion panel ── */
.disc-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem 1.8rem;
  box-shadow: var(--shadow-sm);
}

.disc-header {
  display: flex;
  align-items: center;
  gap: .8rem;
  margin-bottom: 1.1rem;
  padding-bottom: .8rem;
  border-bottom: 1px solid var(--border);
}

.disc-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--gold-bg);
  border: 1px solid var(--gold-bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.disc-title {
  font-weight: 700;
  font-size: .9rem;
  color: var(--ink);
}

.disc-sub {
  font-size: .7rem;
  font-family: 'DM Mono', monospace;
  color: var(--ink4);
  margin-top: .1rem;
}

.q-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .75rem;
  margin-bottom: 1.2rem;
}

.q-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .8rem 1rem;
  font-size: .79rem;
  color: var(--ink2);
  line-height: 1.6;
  cursor: pointer;
  transition: all .18s;
  position: relative;
  overflow: hidden;
}

.q-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
  transform: scaleY(0);
  transition: transform .18s;
  transform-origin: bottom;
}

.q-item:hover {
  background: var(--gold-bg);
  border-color: var(--gold-bd);
  color: var(--ink);
}

.q-item:hover::before { transform: scaleY(1); }

.q-num {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: .25rem;
}

.note-label {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink4);
  margin-bottom: .5rem;
  display: flex;
  align-items: center;
  gap: .6rem;
}

.note-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.note-area {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: .82rem;
  line-height: 1.7;
  padding: .85rem 1rem;
  resize: vertical;
  min-height: 96px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}

.note-area:focus {
  border-color: var(--gold-bd);
  box-shadow: 0 0 0 3px rgba(200,134,10,.1);
}

.note-area::placeholder { color: var(--ink4); }

/* ── Rating row ── */
.rating-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
}

.rate-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 1rem .75rem;
  text-align: center;
  cursor: pointer;
  transition: all .2s ease;
  box-shadow: var(--shadow-sm);
}

.rate-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--border2);
}

.rate-emoji { font-size: 1.6rem; display: block; margin-bottom: .3rem; }

.rate-label {
  font-size: .7rem;
  color: var(--ink3);
  font-family: 'DM Mono', monospace;
  line-height: 1.3;
}

.rate-card.sel-1 { background: var(--t-bg); border-color: var(--t-border); }
.rate-card.sel-1 .rate-label { color: var(--t-text); font-weight: 600; }
.rate-card.sel-2 { background: var(--w-bg); border-color: var(--w-border); }
.rate-card.sel-2 .rate-label { color: var(--w-text); font-weight: 600; }
.rate-card.sel-3 { background: var(--gold-bg); border-color: var(--gold-bd); }
.rate-card.sel-3 .rate-label { color: var(--gold); font-weight: 600; }
.rate-card.sel-4 { background: var(--s-bg); border-color: var(--s-border); }
.rate-card.sel-4 .rate-label { color: var(--s-text); font-weight: 600; }

/* ── Nav row ── */
.nav-row {
  display: flex;
  align-items: center;
  gap: .75rem;
}

.nbtn {
  padding: .6rem 1.5rem;
  border-radius: 7px;
  font-size: .8rem;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--ink2);
  box-shadow: var(--shadow-sm);
}

.nbtn:hover:not(:disabled) {
  border-color: var(--gold-bd);
  color: var(--gold);
  background: var(--gold-bg);
}

.nbtn:disabled { opacity: .35; cursor: default; box-shadow: none; }

.nbtn.primary {
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
  font-weight: 700;
}

.nbtn.primary:hover { background: #b87800; border-color: #b87800; }

.nav-progress {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  color: var(--ink4);
}

.nav-progress span { color: var(--gold); font-weight: 700; }

/* ── Bottom progress bar ── */
.prog-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: var(--border);
  z-index: 100;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--s-dot));
  transition: width .5s cubic-bezier(.4,0,.2,1);
  border-radius: 0 2px 2px 0;
}

/* ── Responsive ── */
@media (max-width: 960px) {
  .app { grid-template-columns: 1fr; padding: 1.25rem 1rem 5rem; }
  .sidebar { position: static; }
  .topic-list { flex-direction: row; flex-wrap: wrap; gap: .4rem; }
  .topic-btn { flex: none; width: auto; }
  .t-label { display: none; }
  .t-num { font-size: .8rem; }
  .topic-btn.active .t-label { display: block; }
  .swot-grid { grid-template-columns: 1fr; }
  .q-grid { grid-template-columns: 1fr; }
  .rating-row { grid-template-columns: repeat(2, 1fr); }
  .header-inner { gap: 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="eyebrow">Science Fair Research Explorer · 高中科展研究工具</div>
      <h1>科學研究題目 <em>SWOT</em> 分析</h1>
      <div class="header-sub">10個創新高中科研題目 · 師生互動討論 · 源自莫札瑞拉起司科展報告 (第65屆全國中小學科展)</div>
    </div>
    <div class="legend-strip">
      <div class="leg"><div class="leg-sq" style="background:var(--s-dot);border-radius:3px"></div>優勢 Strengths</div>
      <div class="leg"><div class="leg-sq" style="background:var(--w-dot);border-radius:3px"></div>劣勢 Weaknesses</div>
      <div class="leg"><div class="leg-sq" style="background:var(--o-dot);border-radius:3px"></div>機會 Opportunities</div>
      <div class="leg"><div class="leg-sq" style="background:var(--t-dot);border-radius:3px"></div>威脅 Threats</div>

const QUADS = [
  { key:'S', cls:'s-card', letter:'S', en:'Strengths',    zh:'優勢', hint:'為什麼這個題目可行？' },
  { key:'W', cls:'w-card', letter:'W', en:'Weaknesses',   zh:'劣勢', hint:'執行上有哪些挑戰？' },
  { key:'O', cls:'o-card', letter:'O', en:'Opportunities',zh:'機會', hint:'延伸與發展空間？' },
  { key:'T', cls:'t-card', letter:'T', en:'Threats',      zh:'威脅', hint:'可能遇到哪些風險？' },
];

const SCORES = [
  { emoji:'😅', label:'難度過高',  cls:'sel-1', val:1 },
  { emoji:'🤔', label:'需再評估', cls:'sel-2', val:2 },
  { emoji:'✅', label:'值得嘗試', cls:'sel-3', val:3 },
  { emoji:'🔥', label:'強烈推薦', cls:'sel-4', val:4 },
];

const state = {
  cur: 0,
  scores: Array(TOPICS.length).fill(0),
  notes:  Array(TOPICS.length).fill(''),
  hi: {}   // ti -> { S:[...], W:[...], O:[...], T:[...] }
};

function getHi(ti, q) { return state.hi[ti]?.[q] ?? []; }
function toggleHi(ti, q, ii) {
  if (!state.hi[ti]) state.hi[ti] = {S:[],W:[],O:[],T:[]};
  const arr = state.hi[ti][q];
  const idx = arr.indexOf(ii);
  idx === -1 ? arr.push(ii) : arr.splice(idx, 1);
  renderMain();
}

/* ── Sidebar ── */
function renderSidebar() {
  const sc = ['','sel-1','sel-2','sel-3','sel-4'];
  const sl = ['','★1','★2','★3','★4'];
  const sc2 = ['','#d03048','#e07030','#c8860a','#2ea06a'];
  el('topicList').innerHTML = TOPICS.map((t,i) => `
    <button class="topic-btn ${i===state.cur?'active':''}" onclick="go(${i})">
      <span class="t-num">${String(i+1).padStart(2,'0')}</span>
      <span class="t-label">${t.short}</span>
      ${state.scores[i]?`<span class="t-score" style="background:${sc2[state.scores[i]]}20;color:${sc2[state.scores[i]]};border:1px solid ${sc2[state.scores[i]]}40">${sl[state.scores[i]]}</span>`:''}
    </button>
  `).join('');
}

/* ── Main ── */
function renderMain() {
  const t  = TOPICS[state.cur];
  const ti = state.cur;
  const sc = state.scores[ti];

  el('mainPanel').innerHTML = `
    <!-- Hero -->
    <div class="hero-card anim">
      <div class="hero-top">
        <div class="hero-num">${String(ti+1).padStart(2,'0')}</div>
        <div class="hero-right">
          <div class="hero-tags">
            ${t.tags.map((tg,i)=>`<span class="htag ${t.tagCls[i]}">${tg}</span>`).join('')}
          </div>
          <h2>${t.title.replace(t.mark,`<mark>${t.mark}</mark>`)}</h2>
        </div>
      </div>
      <p class="hero-desc">${t.desc}</p>
    </div>

    <!-- SWOT -->
    <div class="swot-grid anim anim-d1">
      ${QUADS.map(q => `
        <div class="swot-card ${q.cls}">
          <div class="swot-head">
            <div class="swot-letter">${q.letter}</div>
            <div class="swot-head-info">
              <div class="swot-en">${q.en}</div>
              <div class="swot-zh">${q.zh}</div>
            </div>
            <div class="swot-hint">${q.hint}</div>
          </div>
          <div class="swot-body">
            ${t.swot[q.key].map((item,ii)=>`
              <div class="swot-item ${getHi(ti,q.key).includes(ii)?'hi':''}"
                   onclick="toggleHi(${ti},'${q.key}',${ii})">
                <span class="si-dot"></span>
                <span>${item}</span>
                <span class="si-star">★</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <!-- Discussion -->
    <div class="disc-panel anim anim-d2">
      <div class="disc-header">
        <div class="disc-icon">💬</div>
        <div>
          <div class="disc-title">師生討論引導問題</div>
          <div class="disc-sub">Discussion Guide · 點擊題目展開課堂討論</div>
        </div>
      </div>
      <div class="q-grid">
        ${t.questions.map((q,i)=>`
          <div class="q-item">
            <span class="q-num">Q${i+1}</span>${q}
          </div>
        `).join('')}
      </div>
      <div class="note-label">課堂筆記 · Notes</div>
      <textarea class="note-area"
        placeholder="記錄師生討論的重點、學生的想法、待追蹤的問題……"
        oninput="state.notes[${ti}]=this.value">${state.notes[ti]}</textarea>
    </div>

    <!-- Rating -->
    <div class="rating-row anim anim-d3">
      ${SCORES.map(s=>`
        <div class="rate-card ${sc===s.val?s.cls:''}" onclick="setScore(${ti},${s.val})">
          <span class="rate-emoji">${s.emoji}</span>
          <div class="rate-label">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <!-- Nav -->
    <div class="nav-row anim anim-d4">
      <button class="nbtn" onclick="go(${ti-1})" ${ti===0?'disabled':''}>← 上一題</button>
      <button class="nbtn primary" onclick="go(${ti+1})" ${ti===TOPICS.length-1?'disabled':''}>下一題 →</button>
      <div class="nav-progress">已評估 <span>${state.scores.filter(s=>s>0).length}</span> / ${TOPICS.length} 題</div>
    </div>
  `;

  el('progFill').style.width = (state.scores.filter(s=>s>0).length/TOPICS.length*100)+'%';
}

function go(i) {
  if (i<0||i>=TOPICS.length) return;
  state.cur = i;
  renderSidebar();
  renderMain();
  document.querySelector('.main-panel').scrollIntoView({behavior:'smooth',block:'start'});
}

function setScore(ti, v) {
  state.scores[ti] = state.scores[ti]===v ? 0 : v;
  renderSidebar();
  renderMain();
}

function el(id) { return document.getElementById(id); }

renderSidebar();
renderMain();
</script>
